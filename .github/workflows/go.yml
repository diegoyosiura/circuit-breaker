# CI do circuit-breaker.
# A versão do Go vem do go.mod (go-version-file) — fonte única de verdade;
# `go mod tidy` valida a sincronização em vez de reescrever silenciosamente.

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Verify dependencies
      run: |
        go mod download
        go mod tidy
        git diff --exit-code -- go.mod go.sum

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build ./...

    - name: Run tests with coverage
      run: |
        go test -race -count=1 -coverpkg=./pkg/... -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | awk '/^total:/ {print "coverage: " $3}'
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.out
        flags: unittests
        name: codecov-go
